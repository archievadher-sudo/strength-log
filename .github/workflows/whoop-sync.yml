name: WHOOP sync

# Pulls WHOOP data daily and commits docs/whoop_data.json (Pages redeploys).
# Also persists the rotated refresh token back into the WHOOP_REFRESH_TOKEN secret.

on:
  schedule:
    - cron: "20 * * * *"     # hourly at :20 — intraday strain updates; recovery/sleep finalise after morning sync
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write            # to commit docs/whoop_data.json

concurrency:
  group: whoop-sync          # never run two token-refreshes at once (tokens rotate)
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so the squash-amend below is safe

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch WHOOP data
        id: fetch
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          WHOOP_START: "2026-06-28"   # align to the training-programme start date
        run: |
          if [ -z "$WHOOP_CLIENT_ID" ]; then
            echo "WHOOP secrets not configured yet — skipping (add them, then re-run)."
            echo "skipped=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          python3 whoop/fetch.py

      # Persist the rotated refresh token even if the fetch step failed midway
      # (fetch.py writes new_refresh_token.txt immediately after refreshing).
      - name: Save rotated refresh token
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}   # fine-grained PAT with Secrets: read+write
        run: |
          # -s: only a NON-EMPTY token file is ever written back. Persisting a
          # blank value silently bricks every later run (400 invalid_request),
          # and the old step reported success either way.
          if [ -s new_refresh_token.txt ]; then
            gh secret set WHOOP_REFRESH_TOKEN --body "$(cat new_refresh_token.txt)"
            rm -f new_refresh_token.txt
            echo "refresh token rotated + saved"
          elif [ -f new_refresh_token.txt ]; then
            rm -f new_refresh_token.txt
            echo "::error::rotated token file was EMPTY — refusing to overwrite the secret with a blank value"
            exit 1
          else
            echo "no new token to save"
          fi

      - name: Commit if changed (squash consecutive syncs)
        if: steps.fetch.outputs.skipped != 'true' && hashFiles('docs/whoop_data.json') != ''
        run: |
          git config user.name  "whoop-sync[bot]"
          git config user.email "whoop-sync@users.noreply.github.com"
          git add docs/whoop_data.json
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          MSG="WHOOP sync: $(date -u +'%Y-%m-%d %H:%M')Z"
          # keep history clean: if the tip is already a sync commit, fold this
          # update into it instead of stacking a new commit every hour
          if [ "$(git log -1 --pretty=%an)" = "whoop-sync[bot]" ]; then
            git commit --amend -m "$MSG"
            git push --force-with-lease origin main
          else
            git commit -m "$MSG"
            git push origin main
          fi
