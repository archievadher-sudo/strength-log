<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WHOOP — authorization code</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#F1ECE0;color:#111;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
  .card{max-width:560px;background:#fff;border:1px solid #E5E1D4;border-radius:20px;padding:30px 32px;
    box-shadow:0 10px 30px rgba(17,17,17,.08)}
  h1{font-size:20px;margin:0 0 6px}
  p{color:#6B6B6B;font-size:14px;line-height:1.6;margin:0 0 16px}
  code{display:block;background:#F5F3ED;border:1px dashed #D4D0C3;border-radius:10px;padding:14px;
    font-family:ui-monospace,Menlo,monospace;font-size:13px;word-break:break-all;color:#8B6914;margin-bottom:14px}
  button{background:#D4A043;color:#241a06;border:none;border-radius:999px;padding:10px 18px;
    font-weight:700;font-size:13px;cursor:pointer}
  .err{color:#991B1B}
  @media(prefers-color-scheme:dark){body{background:#0B0B0C;color:#F5F5F5}.card{background:#161618;border-color:#2A2A2E}
    code{background:#1E1E20;border-color:#3A3A40;color:#E8C578}p{color:#8A8C92}}
</style>
<div class="card">
  <h1>WHOOP authorization code</h1>
  <p id="msg">Copy the code below, then run the exchange command from the setup steps to mint your refresh token.</p>
  <code id="code">reading…</code>
  <button id="copy">Copy code</button>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const code = p.get('code'), err = p.get('error');
  const el = document.getElementById('code');
  if (err) { el.textContent = err + (p.get('error_description')?(' — '+p.get('error_description')):''); el.classList.add('err');
    document.getElementById('msg').textContent = 'Authorization failed.'; }
  else if (code) { el.textContent = code; }
  else { el.textContent = 'No code in the URL. Start the flow from the authorize link.'; }
  document.getElementById('copy').onclick = () => {
    navigator.clipboard.writeText(code||'').then(()=>{document.getElementById('copy').textContent='Copied ✓';});
  };
</script>
